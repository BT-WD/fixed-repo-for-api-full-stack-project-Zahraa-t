<!DOCTYPE html>
<html lang="en">
<head> 
  <meta charset="UTF-8">
  <title>Cat Info</title>
  <link rel="stylesheet" href="index.css">
  
</head>
<body>

<div class="page">

  <h1 class="bg-title">Cat Info</h1>

  <div class="header-text">
    <h2>Learn more about different breeds!</h2>
  </div>

  <div class="form">

    <div class="row">
      <label>Cat Type :</label>
      <input type="text" id="cat-type">
    </div>

    <div class="row">
      <label>Origin:</label>
      <input type="text" id="origin">
    </div>

    <div class="column">
      <label>Description:</label>
      <div class="description-box" id="description-box">
  <div id="text-content"></div>
  
  <div class="img-row" id="img-row"></div>
</div>
    </div>

  </div>

<div class="search-section">
  <button id="search-btn" class="star-btn">★</button>
  <input type="text" id="search-input" placeholder="SEARCH:">
</div>

<button id="fav-btn" class="star-btn" style="width: auto; padding: 10px 20px; margin-top: 20px;">
  Add to Favorites 
</button>

<div id="favorites-list"></div>

</div>

<script type="module" src="index.js"></script>
</body>
</html>
