<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cat Info</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="page">

  <!-- Big faded title -->
  <h1 class="bg-title">Cat Info</h1>

  <!-- Top text -->
  <div class="header-text">
    <h2>Learn more about different breeds!</h2>
  </div>

  <!-- Form section -->
  <div class="form">

    <div class="row">
      <label>Cat Type :</label>
      <input type="text">
    </div>

    <div class="row">
      <label>Origin:</label>
      <input type="text">
    </div>

    <div class="column">
      <label>Description:</label>
      <textarea></textarea>
    </div>

  </div>

  <!-- Search section -->
  <div class="search-section">
    <div class="star"></div>
    <input type="text" placeholder="SEARCH:">
  </div>

</div>

</body>
</html>
